apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
      annotations:
        # OpenBao Sidecar Injector
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "dev-role"
        vault.hashicorp.com/address: "http://openbao.openbao.svc:8200"
        vault.hashicorp.com/agent-inject-secret-frontend.env: "secret/data/dev/frontend"
        vault.hashicorp.com/agent-inject-template-frontend.env: |
          {{- with secret "secret/data/dev/frontend" -}}
          export CURRENCY_SERVICE_ADDR="{{ .Data.data.CURRENCY_SERVICE_ADDR }}"
          export AD_SERVICE_ADDR="{{ .Data.data.AD_SERVICE_ADDR }}"
          {{- end }}
    spec:
      serviceAccountName: frontend
      containers:
        - name: frontend
          image: image-registry.openshift-image-registry.svc:5000/cicd/frontend:c10f33755879ab52a69ab7a32fdbdf0dfe1ff090
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: PRODUCT_CATALOG_SERVICE_ADDR
              value: "productcatalogservice:3550"
            - name: CURRENCY_SERVICE_ADDR
              value: "currencyservice:7000"   
            - name: CART_SERVICE_ADDR
              value: "cartservice:7070"
            - name: RECOMMENDATION_SERVICE_ADDR
              value: "recommendationservice:8080"
            - name: CHECKOUT_SERVICE_ADDR
              value: "checkoutservice:5050"
            - name: SHIPPING_SERVICE_ADDR
              value: "shippingservice:50051"
            - name: AD_SERVICE_ADDR
              value: "adservice:9555"
            - name: SHOPPING_ASSISTANT_SERVICE_ADDR
              value: "shoppingassistantservice:8080"
            - name: ENV_PLATFORM
              value: "local"
            - name: ENABLE_TRACING
              value: "1"
            - name: COLLECTOR_SERVICE_ADDR
              value: "jaeger.observability:4317"
            - name: OTEL_SERVICE_NAME
              value: "frontend"
          resources:
            requests:
              cpu: 30m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: dev
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: frontend
  namespace: dev
spec:
  to:
    kind: Service
    name: frontend
  port:
    targetPort: 8080
  tls:
    termination: edge
